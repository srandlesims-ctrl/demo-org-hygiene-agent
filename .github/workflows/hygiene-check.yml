# Demo Org Hygiene Agent - scheduled run every 3 days
# Ensures the demo org has pipeline, events, activity, notes, and Pipeline Management Agent Activity
# so it's ready for events, demo booth, and customer deal cycles.
# Secrets: SF_AUTH_URL (required for scheduled run), optional SLACK_WEBHOOK_URL.

name: Demo Org Hygiene

on:
  schedule:
    - cron: '0 6 */3 * *'
  workflow_dispatch:

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli
          sf version

      - name: Install dependencies
        run: npm install

      - name: Auth Salesforce org
        env:
          SF_AUTH_URL: ${{ secrets.SF_AUTH_URL }}
        run: |
          if [ -z "$SF_AUTH_URL" ]; then
            echo "SF_AUTH_URL not set; skipping auth (check will report Auth failed for orgs)"
            exit 0
          fi
          echo "$SF_AUTH_URL" | sf org login sfdx-url --alias sdo-amer --set-default --sfdx-url-stdin

      - name: Run hygiene (check + remediate)
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: npm start
        continue-on-error: true

      # Separate step so the flow always runs even when npm start exits 1 (e.g. org still failing after remediate).
      # This keeps Agent Activity refreshed every scheduled run regardless of check result.
      - name: Run Pipeline Management flow
        run: sf apex run --file scripts/RunPipelineManagementFlow.apex --target-org sdo-amer
        continue-on-error: true
